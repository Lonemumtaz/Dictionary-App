<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexicon — Dictionary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page-bg">
        <div class="grain"></div>
    </div>

    <main class="container">

        <header class="site-header">
            <div class="logo-mark">L</div>
            <h1 class="site-title">Lexicon</h1>
            <p class="site-tagline">Every word. Instantly.</p>
        </header>

        <section class="search-section">
            <div class="search-form">
                <span class="search-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </span>
                <input type="text" id="search-input" placeholder="Search a word…" autocomplete="off" spellcheck="false">
                <button id="search-btn">
                    <span class="btn-text">Search</span>
                    <span class="btn-arrow">→</span>
                </button>
            </div>
        </section>

        <section class="dictionary-app" id="dictionary-app" aria-live="polite"></section>

    </main>

    <script src="script.js"></script>
</body>
</html>
